<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
  }

  .ad {
    width: 1080px;
    height: 1080px;
    background: linear-gradient(160deg, #0a1628 0%, #0f1d35 40%, #162544 100%);
    position: relative;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Subtle paw pattern overlay */
  .ad::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(circle at 15% 20%, rgba(212, 175, 55, 0.04) 0%, transparent 50%),
      radial-gradient(circle at 85% 75%, rgba(212, 175, 55, 0.03) 0%, transparent 40%);
    z-index: 0;
  }

  /* Gold accent line at top */
  .top-accent {
    width: 100%;
    height: 5px;
    background: linear-gradient(90deg, #d4af37, #f5d76e, #d4af37);
    flex-shrink: 0;
  }

  .content {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 60px 70px 50px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: rgba(212, 175, 55, 0.12);
    border: 1.5px solid rgba(212, 175, 55, 0.35);
    border-radius: 50px;
    padding: 12px 26px;
    color: #f5d76e;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    width: fit-content;
    margin-bottom: 50px;
  }

  .badge-dot {
    width: 8px;
    height: 8px;
    background: #d4af37;
    border-radius: 50%;
  }

  .headline {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 88px;
    line-height: 1.05;
    color: #ffffff;
    margin-bottom: 10px;
  }

  .headline .gold {
    color: #d4af37;
    display: block;
  }

  .subtext {
    font-size: 28px;
    color: rgba(255, 255, 255, 0.55);
    font-weight: 400;
    line-height: 1.5;
    margin-bottom: auto;
    max-width: 700px;
    margin-top: 25px;
  }

  .features {
    display: flex;
    gap: 40px;
    margin-bottom: 50px;
  }

  .feature {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .feature-icon {
    width: 48px;
    height: 48px;
    background: rgba(212, 175, 55, 0.1);
    border: 1.5px solid rgba(212, 175, 55, 0.25);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  .feature-text {
    font-size: 20px;
    color: rgba(255, 255, 255, 0.75);
    font-weight: 500;
  }

  .bottom-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .brand-icon {
    width: 54px;
    height: 54px;
    background: linear-gradient(135deg, #d4af37, #f5d76e);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
  }

  .brand-name {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 26px;
    color: #ffffff;
  }

  .brand-sub {
    font-size: 14px;
    color: rgba(255,255,255,0.4);
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .cta {
    background: linear-gradient(135deg, #d4af37, #c4a030);
    color: #0a1628;
    font-size: 22px;
    font-weight: 700;
    padding: 20px 44px;
    border-radius: 14px;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .cta-arrow {
    font-size: 20px;
  }

  /* Decorative element */
  .deco-circle {
    position: absolute;
    width: 400px;
    height: 400px;
    border: 1.5px solid rgba(212, 175, 55, 0.06);
    border-radius: 50%;
    top: -100px;
    right: -100px;
    z-index: 0;
  }

  .deco-circle-2 {
    position: absolute;
    width: 300px;
    height: 300px;
    border: 1.5px solid rgba(212, 175, 55, 0.04);
    border-radius: 50%;
    top: -50px;
    right: -50px;
    z-index: 0;
  }
</style>
</head>
<body>
<div class="ad">
  <div class="deco-circle"></div>
  <div class="deco-circle-2"></div>
  <div class="top-accent"></div>
  <div class="content">
    <div class="badge">
      <div class="badge-dot"></div>
      Houston Mobile Grooming
    </div>

    <div class="headline">
      We Come<br>
      <span class="gold">To You.</span>
    </div>

    <div class="subtext">
      Professional grooming at your doorstep.<br>
      No car rides. No stress. No waiting rooms.
    </div>

    <div class="features">
      <div class="feature">
        <div class="feature-icon">&#128758;</div>
        <div class="feature-text">Fully equipped<br>mobile salon</div>
      </div>
      <div class="feature">
        <div class="feature-icon">&#9201;</div>
        <div class="feature-text">Book online<br>in 60 seconds</div>
      </div>
      <div class="feature">
        <div class="feature-icon">&#10024;</div>
        <div class="feature-text">Starting at<br>just $59</div>
      </div>
    </div>

    <div class="bottom-bar">
      <div class="brand">
        <div class="brand-icon">&#128054;</div>
        <div>
          <div class="brand-name">Royal Pawz USA</div>
          <div class="brand-sub">Premium Mobile Grooming</div>
        </div>
      </div>
      <div class="cta">Book Now <span class="cta-arrow">&rarr;</span></div>
    </div>
  </div>
</div>
</body>
</html>
