<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
  }

  .ad {
    width: 1080px;
    height: 1080px;
    background: #faf8f4;
    position: relative;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Top section - dark */
  .top-section {
    background: linear-gradient(160deg, #0a1628 0%, #132040 100%);
    padding: 55px 70px 50px;
    position: relative;
    flex-shrink: 0;
  }

  .top-section::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, #d4af37, #f5d76e, #d4af37);
  }

  .brand-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 40px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .brand-icon {
    width: 46px;
    height: 46px;
    background: linear-gradient(135deg, #d4af37, #f5d76e);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
  }

  .brand-name {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 24px;
    color: #ffffff;
  }

  .stars {
    display: flex;
    gap: 4px;
    font-size: 26px;
    color: #d4af37;
  }

  .review-text {
    font-family: 'Playfair Display', serif;
    font-size: 52px;
    font-weight: 700;
    line-height: 1.25;
    color: #ffffff;
  }

  .review-text em {
    font-style: italic;
    color: #f5d76e;
  }

  .reviewer {
    margin-top: 28px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .reviewer-avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: rgba(212, 175, 55, 0.2);
    border: 2px solid rgba(212, 175, 55, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: #d4af37;
    font-weight: 700;
  }

  .reviewer-info {
    font-size: 18px;
    color: rgba(255,255,255,0.6);
    font-weight: 500;
  }

  .reviewer-info strong {
    color: rgba(255,255,255,0.85);
    font-weight: 600;
  }

  /* Bottom section - light */
  .bottom-section {
    flex: 1;
    padding: 50px 70px 55px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .stats {
    display: flex;
    gap: 30px;
  }

  .stat {
    flex: 1;
    background: #ffffff;
    border: 1.5px solid #e8e4dc;
    border-radius: 20px;
    padding: 32px 28px;
    text-align: center;
  }

  .stat-number {
    font-size: 56px;
    font-weight: 800;
    color: #0a1628;
    line-height: 1;
    margin-bottom: 8px;
  }

  .stat-number .gold {
    color: #d4af37;
  }

  .stat-label {
    font-size: 17px;
    color: #6b7280;
    font-weight: 500;
    line-height: 1.3;
  }

  .bottom-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .tagline {
    font-size: 22px;
    color: #374151;
    font-weight: 500;
  }

  .tagline strong {
    color: #0a1628;
    font-weight: 700;
  }

  .cta {
    background: linear-gradient(135deg, #0a1628, #162544);
    color: #f5d76e;
    font-size: 22px;
    font-weight: 700;
    padding: 22px 48px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
</style>
</head>
<body>
<div class="ad">
  <div class="top-section">
    <div class="brand-row">
      <div class="brand">
        <div class="brand-icon">&#128054;</div>
        <div class="brand-name">Royal Pawz USA</div>
      </div>
      <div class="stars">&#9733;&#9733;&#9733;&#9733;&#9733;</div>
    </div>

    <div class="review-text">
      "They came right to my house and my dog was <em>so much calmer</em> than at the old groomer."
    </div>

    <div class="reviewer">
      <div class="reviewer-avatar">S</div>
      <div class="reviewer-info">
        <strong>Sarah M.</strong> &mdash; Katy, TX &middot; Repeat customer
      </div>
    </div>
  </div>

  <div class="bottom-section">
    <div class="stats">
      <div class="stat">
        <div class="stat-number">250<span class="gold">+</span></div>
        <div class="stat-label">Completed<br>grooms</div>
      </div>
      <div class="stat">
        <div class="stat-number">138<span class="gold">+</span></div>
        <div class="stat-label">Happy<br>customers</div>
      </div>
      <div class="stat">
        <div class="stat-number">99<span class="gold">%</span></div>
        <div class="stat-label">Friendly pups<br>served</div>
      </div>
    </div>

    <div class="bottom-row">
      <div class="tagline">
        <strong>Houston's premium</strong> mobile grooming
      </div>
      <div class="cta">Book Your Spot &rarr;</div>
    </div>
  </div>
</div>
</body>
</html>
