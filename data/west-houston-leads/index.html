<script id="src" type="text/markdown"># West Houston Early-Stage Home-Service Leads — Verified Master Index

**Prepared for:** Hamza / Zapp Studios · **Date:** 2026-06-07 · **Supersedes** the original 20-lead prospecting draft.

This is the prioritized, **live-verified** version of the 20-lead list. Each company went through three passes: (1) multi-modal web research, (2) an independent adversarial fact-check, and (3) a live browser pass (Google Maps / company site / Comptroller / TDLR) on 2026-06-07. Full per-company write-ups are in `dossiers/<slug>.md`.

**Fit is scored on your stated thesis:** early-stage owner-operators with proven demand but **thin conversion infrastructure** (no real online booking, no SMS follow-up, no paid acquisition) — the profile most likely to need *and buy* the Royal Pawz funnel (Google Ads → landing page → frictionless booking → Twilio SMS; 7%→30.8% booking conversion, ~50x MRR, 5x ROAS in ~4 months). Companies with 120+ Google reviews are demoted per your own "Washington A/C" rule, and companies that **already have online booking** are demoted because the core build is already done.

## What the verification changed (headline corrections)

- **Several "early-stage" leads are actually established.** Live Google review counts: Houston Strong Roofing **238**, Evergreen **434**, Katy Fence **252**, Sunrise Maids **181**, Washington A/C **148**, Modern Air **143**, Katy Brothers **125**, Tex-Mex **113**, RMP **103**, Southern Roots **100**. The draft's "12–24 reviews" figures were mostly Yelp/widget counts, not Google.
- **Two are already running online booking** — Modern Air (HouseCall Pro) and Sunrise Maids (BookingKoala) — so the funnel-build pitch largely doesn't apply.
- **Two have dead/lapsed legal standing** — Conquer Electrical (both TDLR licenses expired + LLC franchise tax involuntarily ended + website won't load) and His Kingdom Electrical (franchise tax ended, SOS inactive). Both are compliance risks; do not pitch until standing is resolved.
- **Owner/identity fixes:** His Kingdom owner is **Steven Garza** (not "Edwin Larin"); Evergreen's legal entity is **Evergreen Outdoor Services, LLC**; All Brands' fake "Lorem ipsum / Jane Faber" testimonials have since been replaced with a real Google widget; Tex-Mex's real Google rating is **4.9/113**, not the self-claimed "5.0/85+"; Bella's real address is Med Center (77030), **not** the Energy-Corridor Skelton Dr address in the draft.

## Tiers & recommended action

**Tier A — Pitch now (top 5).** Mama Bear Pest, I & J Pressure Washing, Tex Mex Junk Removal, All Brands AC, High Energy Detailing. Genuine early-stage demand + a concrete, screenshot-able conversion leak. **Draft pitch pages built for all five** (see below). Open each with its specific gap + the Royal Pawz proof.

**Tier B — Warm secondary (verify-then-pitch).** RMP Plumbing, Emerald Lawn, Bella's Neat Maid, Southern Roots Fencing, Katy Brothers. Solid fits with one caveat each (RMP license; Bella's geo; Tree Care entity — keep Tree Care parked until confirmed real). Reuse the closest Tier-A pitch template per vertical.

**Tier C — Established-but-leaky (different pitch, bigger budget).** Houston Strong Roofing (238 reviews, form-only) and Evergreen (434, form-only) aren't early-stage, but they have proven volume and no real booking/automation — they're strong **Revenue System Build / paid-acquisition** clients if you're willing to fish above the early-stage pond. Lead with ROI on existing demand, not "you're small."

**Tier D — Park / disqualify.** Conquer Electrical and His Kingdom Electrical (legal standing); Modern Air & Sunrise Maids (already have booking); Washington A/C & Katy Fence (too established); JC&C (not-a-fit).

## Method & caveats

- Live Google figures captured from Google Maps on 2026-06-07; review counts drift, so treat as point-in-time.
- Paid-ads checks were a representative spot-check (the AC vertical), not exhaustive per company — most `ads = unknown` rather than confirmed-absent. Worth a 60-second incognito SERP check per lead at outreach time.
- Tex-Mex/Tree-Care GBP and any Yelp/Meta figures that gated to automation should be eyeballed once more before a number goes into a sent pitch.
- ROI framing should target affluent residential rings (Memorial / Briar Forest / Energy Corridor), not the lower-income Westchase/Royal Oaks pocket.
