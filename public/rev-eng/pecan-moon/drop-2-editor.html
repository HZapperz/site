<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow"><title>Pecan Moon — Drop 2 Image Editor</title>
<style>
:root{--ink:#2b2622;--mut:#8a807a;--line:#e6e0d9;--bg:#f7f5f2;--red:#c0392b;--gold:#b9905a}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;font-size:14px}
.top{position:sticky;top:0;z-index:20;background:#2b2622;color:#fff;padding:11px 18px;display:flex;align-items:center;gap:16px;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.top b{font-family:Georgia,serif;letter-spacing:.06em}
.top .hint{color:#cdbfae;font-size:12.5px}
.dl{margin-left:auto;background:var(--gold);color:#fff;border:0;padding:10px 18px;border-radius:4px;font-size:13px;letter-spacing:.04em;cursor:pointer;font-weight:600}
.dl:hover{filter:brightness(1.07)}
.count{background:#fff;color:#2b2622;border-radius:20px;padding:3px 11px;font-weight:700;font-size:12.5px}
.wrap{max-width:1500px;margin:0 auto;padding:8px 18px 120px}
.prod{background:#fff;border:1px solid var(--line);border-radius:6px;margin:14px 0;padding:14px 16px}
.ph{display:flex;align-items:baseline;gap:10px;margin-bottom:10px}
.ph h3{font-family:Georgia,serif;font-size:18px;margin:0;letter-spacing:.02em}
.ph .hd{color:var(--mut);font-size:12px}
.ph .edited{color:var(--gold);font-weight:700;font-size:12px;display:none}
.row{display:flex;flex-wrap:wrap;gap:10px}
.tile{position:relative;width:118px;cursor:grab}
.tile.dragging{opacity:.4}
.tile.over{outline:2px dashed var(--gold);outline-offset:2px}
.tile img{width:118px;height:158px;object-fit:cover;border-radius:3px;background:#eee;border:1px solid var(--line);display:block;pointer-events:none}
.tile.del img{filter:grayscale(1) brightness(.7)}
.tile.del::after{content:"DELETE";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;background:rgba(192,57,43,.45);font-weight:800;letter-spacing:.1em;border-radius:3px;font-size:13px}
.badge{position:absolute;top:5px;left:5px;background:rgba(43,38,34,.82);color:#fff;font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:10px;letter-spacing:.05em}
.badge.hero{background:var(--gold)}
.badge.hover{background:#5b7a8a}
.btns{position:absolute;top:4px;right:4px;display:flex;gap:4px;opacity:0;transition:.15s}
.tile:hover .btns{opacity:1}
.btns button{border:0;width:24px;height:24px;border-radius:50%;cursor:pointer;font-size:13px;line-height:1;color:#fff;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.bX{background:var(--red)}
.bH{background:var(--gold)}
.legend{padding:4px 2px 0;color:var(--mut);font-size:12px}
</style></head><body>
<div class="top">
  <b>Drop 2 · Image Editor</b>
  <span class="hint">Drag to reorder · <span style="color:#fff">★</span> = make hero · <span style="color:#fff">×</span> = delete · pos 1 = HERO, pos 2 = HOVER</span>
  <span class="count" id="cnt">0 products edited</span>
  <button class="dl" onclick="download()">⬇ Download changes</button>
</div>
<div class="wrap" id="wrap"></div>

const ORIG = {}; for (const h in DATA) ORIG[h] = DATA[h].images.slice();
const state = {}; for (const h in DATA) state[h] = DATA[h].images.map(u=>({url:u, del:false}));

function changedProducts(){
  const out={};
  for (const h in state){
    const kept=state[h].filter(x=>!x.del).map(x=>x.url);
    const del=state[h].filter(x=>x.del).map(x=>x.url);
    const ch = del.length>0 || JSON.stringify(kept)!==JSON.stringify(ORIG[h]);
    if (ch) out[h]={order:kept, deleted:del};
  }
  return out;
}
function updateCount(){
  const n=Object.keys(changedProducts()).length;
  document.getElementById('cnt').textContent = n+' product'+(n==1?'':'s')+' edited';
}
function tileHTML(h,i){
  const it=state[h][i];
  const pos=i; // index among ALL (incl deleted) for drag; label uses kept-position
  // kept position for HERO/HOVER labels
  const keptIdx=state[h].filter((x,j)=>!x.del && j<=i).length-1;
  let badge = it.del ? '' : (keptIdx===0?'<span class="badge hero">HERO</span>':keptIdx===1?'<span class="badge hover">HOVER</span>':'<span class="badge">'+(keptIdx+1)+'</span>');
  return '<div class="tile'+(it.del?' del':'')+'" draggable="true" data-h="'+h+'" data-i="'+i+'">'
    + badge
    + '<div class="btns"><button class="bH" title="Make hero" onclick="mkHero(event,\''+h+'\','+i+')">★</button>'
    + '<button class="bX" title="Delete / undelete" onclick="toggleDel(event,\''+h+'\','+i+')">'+(it.del?'↺':'×')+'</button></div>'
    + '<img src="'+it.url+'" loading="lazy">'
    + '</div>';
}
function renderProduct(h){
  const el=document.getElementById('p_'+h);
  el.querySelector('.row').innerHTML = state[h].map((_,i)=>tileHTML(h,i)).join('');
  const edited = h in changedProducts();
  el.querySelector('.edited').style.display = edited?'inline':'none';
  bindDnD(el, h);
}
function toggleDel(e,h,i){ e.stopPropagation(); state[h][i].del=!state[h][i].del; renderProduct(h); updateCount(); }
function mkHero(e,h,i){ e.stopPropagation(); const a=state[h]; const [x]=a.splice(i,1); a.unshift(x); renderProduct(h); updateCount(); }

let drag=null;
function bindDnD(el,h){
  el.querySelectorAll('.tile').forEach(t=>{
    t.addEventListener('dragstart',ev=>{ drag={h, i:+t.dataset.i}; t.classList.add('dragging'); ev.dataTransfer.effectAllowed='move'; });
    t.addEventListener('dragend',()=>{ t.classList.remove('dragging'); el.querySelectorAll('.tile').forEach(x=>x.classList.remove('over')); });
    t.addEventListener('dragover',ev=>{ ev.preventDefault(); if(drag&&drag.h===h){ t.classList.add('over'); } });
    t.addEventListener('dragleave',()=>t.classList.remove('over'));
    t.addEventListener('drop',ev=>{
      ev.preventDefault();
      if(!drag||drag.h!==h) return;
      const from=drag.i, to=+t.dataset.i;
      if(from===to) return;
      const a=state[h]; const [x]=a.splice(from,1); a.splice(to,0,x);
      drag=null; renderProduct(h); updateCount();
    });
  });
}
function build(){
  const w=document.getElementById('wrap');
  w.innerHTML = Object.keys(DATA).map(h=>
    '<div class="prod" id="p_'+h+'"><div class="ph"><h3>'+DATA[h].title.replace(/</g,'&lt;')+'</h3>'
    +'<span class="hd">'+DATA[h].images.length+' images</span><span class="edited">● edited</span></div>'
    +'<div class="row"></div></div>'
  ).join('');
  for (const h in DATA) renderProduct(h);
}
function download(){
  const out=changedProducts();
  const n=Object.keys(out).length;
  if(!n){ alert('No changes yet — delete/reorder some images first.'); return; }
  const blob=new Blob([JSON.stringify(out,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='drop2-image-edits.json'; a.click();
}
build();
</script></body></html>
